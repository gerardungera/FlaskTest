<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador del Conjunto de Julia (Flask)</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

    <div class="sidebar">
        <h2>Configuración del Fractal</h2>
        
        <div class="widget-group">
            <label for="c_real">C Real: <span id="val_c_real">-0.62</span></label>
            <input type="range" id="c_real" min="-2.0" max="2.0" step="0.01" value="-0.62772">
        </div>

        <div class="widget-group">
            <label for="c_imag">C Imaginario: <span id="val_c_imag">-0.42</span></label>
            <input type="range" id="c_imag" min="-2.0" max="2.0" step="0.01" value="-0.42193">
        </div>

        <div class="widget-group">
            <label for="res">Resolución</label>
            <select id="res">
                <option value="250">250 px</option>
                <option value="500" selected>500 px</option>
                <option value="750">750 px</option>
                <option value="1000">1000 px</option>
            </select>
        </div>

        <div class="widget-group">
            <label for="iters">Máx. Iteraciones</label>
            <input type="number" id="iters" min="50" max="1000" value="300">
        </div>
    </div>

    <div class="main-content">
        <h1>Explorador del Conjunto de Julia</h1>

        <div class="workspace">
            <div class="canvas-area">
                <img id="fractal_img" src="" alt="Cargando fractal...">
            </div>

            <div class="metrics-area">
                <div class="metric-card">
                    <label>Tiempo de Cálculo</label>
                    <div class="metric-value" id="calc_time">0.0000 s</div>
                </div>

                <div class="info-box">
                    Cada movimiento de control genera una petición AJAX que calcula el conjunto de Julia en tiempo real en el servidor.
                </div>

                <div>
                    <h3>¿Qué estamos viendo?</h3>
                    <p>El Conjunto de Julia se define por la iteración de la función:</p>
                    <div style="font-size: 1.2rem; margin: 10px 0;">
                        $$z_{n+1} = z_n^2 + c$$
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cRealInput = document.getElementById('c_real');
        const cImagInput = document.getElementById('c_imag');
        const resInput = document.getElementById('res');
        const itersInput = document.getElementById('iters');
        
        const valCReal = document.getElementById('val_c_real');
        const valCImag = document.getElementById('val_c_imag');
        const fractalImg = document.getElementById('fractal_img');
        const calcTime = document.getElementById('calc_time');

        function actualizarFractal() {
            valCReal.innerText = cRealInput.value;
            valCImag.innerText = cImagInput.value;

            const url = `/calc?c_real=${cRealInput.value}&c_imag=${cImagInput.value}&res=${resInput.value}&iters=${itersInput.value}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    fractalImg.src = data.image;
                    calcTime.innerText = `${data.time} s`;
                });
        }

        cRealInput.addEventListener('input', actualizarFractal);
        cImagInput.addEventListener('input', actualizarFractal);
        resInput.addEventListener('change', actualizarFractal);
        itersInput.addEventListener('input', actualizarFractal);

        window.onload = actualizarFractal;
    </script>
</body>
</html>
